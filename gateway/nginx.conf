events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS resolver to prevent startup crashes if a container is not fully registered yet
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        # Using variables forces NGINX to resolve at runtime rather than failing on startup
        set $user_app http://user-app:8000;
        set $product_app http://product-app:8000;

        location /api/user {
            proxy_pass $user_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/register {
            proxy_pass $user_app;
            proxy_set_header Host $host;
        }
        
        location /api/login {
            proxy_pass $user_app;
            proxy_set_header Host $host;
        }

        location /api/logout {
            proxy_pass $user_app;
            proxy_set_header Host $host;
        }

        location /api/products {
            proxy_pass $product_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/health {
            proxy_pass $user_app;
        }
    }
}

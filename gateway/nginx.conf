events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location /api/user {
            proxy_pass http://user-app:8000/api/user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/register {
            proxy_pass http://user-app:8000/api/register;
            proxy_set_header Host $host;
        }
        
        location /api/login {
            proxy_pass http://user-app:8000/api/login;
            proxy_set_header Host $host;
        }

        location /api/logout {
            proxy_pass http://user-app:8000/api/logout;
            proxy_set_header Host $host;
        }

        location /api/products {
            proxy_pass http://product-app:8000/api/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/health {
            proxy_pass http://user-app:8000/api/health;
        }
    }
}
